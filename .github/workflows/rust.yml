name: Rust

on:
    push:
        branches: ["master"]
    pull_request:

env:
    CARGO_TERM_COLOR: always

jobs:
    fmt:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Check formatting
              run: cargo fmt --check

    clippy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Clippy
              run: cargo clippy -- -D warnings

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Run tests
              run: cargo test --verbose

    build:
        runs-on: ubuntu-latest
        needs: [fmt, clippy, test]
        steps:
            - uses: actions/checkout@v4
            - name: Build
              run: cargo build --verbose
